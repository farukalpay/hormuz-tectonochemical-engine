<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{PAGE_TITLE}}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f7fb;
        --fg: #13243a;
        --muted: #58657a;
        --card: #ffffff;
        --border: #d7deea;
        --accent: #0f6cbd;
        --accent-dark: #0a4e89;
        --danger-bg: #fff1f2;
        --danger-fg: #9f1239;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(180deg, #f9fcff 0%, var(--bg) 100%);
        color: var(--fg);
      }
      .wrap {
        width: min(760px, calc(100% - 20px));
        margin: 0 auto;
        padding: 20px 0 28px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: clamp(24px, 4.5vw, 34px);
        line-height: 1.15;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: var(--muted);
      }
      .meta {
        margin-top: 14px;
        display: grid;
        gap: 8px;
      }
      .meta-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: #fbfcff;
      }
      .meta-item strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }
      .meta-item code {
        font-size: 12px;
        word-break: break-word;
      }
      form {
        margin-top: 18px;
        display: grid;
        gap: 12px;
      }
      label {
        display: grid;
        gap: 6px;
      }
      label span {
        font-size: 13px;
        font-weight: 600;
      }
      input[type="password"] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
      }
      .actions {
        display: flex;
        align-items: center;
      }
      button {
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      .approve {
        background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
        color: #fff;
        width: 100%;
      }
      .error {
        margin-top: 12px;
        border: 1px solid #f8ccd6;
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--danger-bg);
        color: var(--danger-fg);
        font-size: 13px;
      }
      .note {
        margin-top: 10px;
        font-size: 12px;
      }
      @media (min-width: 768px) {
        .wrap { padding-top: 34px; }
        .card { padding: 24px; }
        .approve { width: auto; min-width: 210px; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>{{PAGE_TITLE}}</h1>
        <p>{{PAGE_SUBTITLE}}</p>
        <div class="meta">
          <div class="meta-item">
            <strong>Requested Resource</strong>
            <code>{{RESOURCE_URI}}</code>
          </div>
          <div class="meta-item">
            <strong>Requested Scope</strong>
            <code>{{SCOPES}}</code>
          </div>
          <div class="meta-item">
            <strong>Client</strong>
            <code>{{CLIENT_NAME}}</code>
          </div>
        </div>
        {{ERROR_BLOCK}}
        <form method="post" action="{{CONSENT_ACTION}}">
          <input type="hidden" name="request_id" value="{{REQUEST_ID}}" />
          {{PASSWORD_FIELD}}
          <div class="actions">
            <button type="submit" class="approve" name="decision" value="approve">Approve</button>
          </div>
        </form>
        <p class="note">This consent page is scoped to this MCP server path.</p>
      </section>
    </main>
  </body>
</html>
